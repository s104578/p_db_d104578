<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Karten Datenbank</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #ffffff; max-width: 1200px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; margin-bottom: 30px; }
        .top-controls { display: flex; gap: 15px; margin-bottom: 40px; }
        .search-bar { flex-grow: 1; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .btn { padding: 10px 20px; border-radius: 5px; cursor: pointer; border: none; font-weight: bold; color: white; }
        .btn-export { background-color: #3498db; }
        .btn-import { background-color: #95a5a6; }
        .set-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card-wrapper { text-decoration: none; color: inherit; display: flex; flex-direction: column; }
        .set-card {
            background-color: #f8f9fa; border: 1px solid #e9ecef; border-radius: 8px;
            padding: 20px; text-align: center; min-height: 200px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 0.2s;
        }
        .set-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .set-card img { width: 100%; height: 100px; object-fit: contain; margin-bottom: 15px; }
        .progress-section { margin-top: 10px; font-size: 0.85em; color: #666; }
        .progress-bar { height: 8px; background: #eee; border-radius: 4px; overflow: hidden; margin-bottom: 4px; }
        .progress-fill { height: 100%; background: #2ecc71; width: 0%; transition: width 0.5s; }
        .stats { display: flex; justify-content: space-between; }
        #importFile { display: none; }
        .hidden { display: none; }

    </style>
</head>
<body>
    <h1>Pokémon Karten Datenbank</h1>
    <div class="top-controls">
        <input type="text" id="searchInput" class="search-bar" placeholder="Nach Set suchen..." onkeyup="filterSets()">
        <button class="btn btn-export" onclick="exportBackup()">Sichern</button>
        <button class="btn btn-import" onclick="document.getElementById('importFile').click()">Laden</button>
        <input type="file" id="importFile" accept=".json" onchange="importBackup(event)">
    </div>

  <div class="container">
    <h2 class="category-title">Englische & Deutsche Sets</h2>
   <div class="sets-grid">
        <a href="kartenliste.html?set=base4" class="card-wrapper" data-id="base4" data-total="130">
            <div class="set-card"><img src="bilder/base4.png"><h3>Base Set 2</h3></div>
            <div class="progress-section">
                <div class="progress-bar"><div class="progress-fill" id="fill-base4"></div></div>
                <div class="stats"><span id="perc-base4">0%</span><span id="stat-base4">000/130</span></div>
            </div>
        </a>
        <a href="kartenliste.html?set=ex1" class="card-wrapper" data-id="ex1" data-total="109">
            <div class="set-card"><img src="bilder/ex1.png"><h3>EX Ruby & Sapphire</h3></div>
            <div class="progress-section">
                <div class="progress-bar"><div class="progress-fill" id="fill-ex1"></div></div>
                <div class="stats"><span id="perc-ex1">0%</span><span id="stat-ex1">000/109</span></div>
            </div>
        </a>
        <a href="kartenliste.html?set=xy12" class="card-wrapper" data-id="xy12" data-total="113">
            <div class="set-card"><img src="bilder/xy12.png"><h3>Evolutions</h3></div>
            <div class="progress-section">
                <div class="progress-bar"><div class="progress-fill" id="fill-xy12"></div></div>
                <div class="stats"><span id="perc-xy12">0%</span><span id="stat-xy12">000/113</span></div>
            </div>
        </a>
        <a href="kartenliste.html?set=cel25" class="card-wrapper" data-id="cel25" data-total="25">
            <div class="set-card"><img src="bilder/cel25.png"><h3>Celebrations</h3></div>
            <div class="progress-section">
                <div class="progress-bar"><div class="progress-fill" id="fill-cel25"></div></div>
                <div class="stats"><span id="perc-cel25">0%</span><span id="stat-cel25">000/25</span></div>
            </div>
        </a>
    </div>
  <div class="container">
    <h2 class="section-title">Japanische Sets</h2>
    <div class="sets-grid">
        <a href="kartenliste.html?set=sm10b" class="card-wrapper" data-id="sm10b" data-total="69">
            <div class="set-card"><img src="bilder/sm10b.png"><h3>Sky Legends</h3></div>
            <div class="progress-section"><div class="progress-bar"><div class="progress-fill" id="fill-sm10b"></div></div>
            <div class="stats"><span id="perc-sm10b">0%</span><span id="stat-sm10b">0/69</span></div></div>
        </a>
        <a href="kartenliste.html?set=sm11" class="card-wrapper" data-id="sm11" data-total="115">
            <div class="set-card"><img src="bilder/sm11.png"><h3>Miracle Twins</h3></div>
            <div class="progress-section"><div class="progress-bar"><div class="progress-fill" id="fill-sm11"></div></div>
            <div class="stats"><span id="perc-sm11">0%</span><span id="stat-sm11">0/115</span></div></div>
        </a>
        <a href="kartenliste.html?set=sm11a" class="card-wrapper" data-id="sm11a" data-total="80">
            <div class="set-card"><img src="bilder/sm11a.png"><h3>Remix Bout</h3></div>
            <div class="progress-section"><div class="progress-bar"><div class="progress-fill" id="fill-sm11a"></div></div>
            <div class="stats"><span id="perc-sm11a">0%</span><span id="stat-sm11a">0/80</span></div></div>
        </a>
        <a href="kartenliste.html?set=smp2" class="card-wrapper" data-id="smp2" data-total="24">
            <div class="set-card"><img src="bilder/smp2.png"><h3>Det. Pikachu</h3></div>
            <div class="progress-section"><div class="progress-bar"><div class="progress-fill" id="fill-smp2"></div></div>
            <div class="stats"><span id="perc-smp2">0%</span><span id="stat-smp2">0/24</span></div></div>
        </a>
    </div>
</div>
    <script>
        function updateProgress() {
            document.querySelectorAll('.card-wrapper').forEach(set => {
                const storageId = set.getAttribute('data-id');
                const total = parseInt(set.getAttribute('data-total'));
                let count = 0;
                
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key.startsWith(storageId + '-') && localStorage.getItem(key) === 'true') {
                        count++;
                    }
                }
                
                const percent = Math.round((count / total) * 100) || 0;
                
                const fillElement = document.getElementById(`fill-${storageId}`);
                const percElement = document.getElementById(`perc-${storageId}`);
                const statElement = document.getElementById(`stat-${storageId}`);

                if (fillElement) fillElement.style.width = percent + '%';
                if (percElement) percElement.innerText = percent + '%';
                if (statElement) statElement.innerText = `${String(count).padStart(3, '0')}/${total}`;
            });
        }

        function filterSets() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.card-wrapper').forEach(card => {
                const setName = card.querySelector('h3').innerText.toLowerCase();
                card.classList.toggle('hidden', !setName.includes(query));
            });
        }

        function exportBackup() {
            const data = {};
            for (let i = 0; i < localStorage.length; i++) { 
                data[localStorage.key(i)] = localStorage.getItem(localStorage.key(i)); 
            }
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `pokemon_backup.json`;
            a.click();
        }

        function importBackup(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    localStorage.clear();
                    for (const key in data) { localStorage.setItem(key, data[key]); }
                    location.reload();
                } catch(err) { alert("Fehler beim Import!"); }
            };
            reader.readAsText(event.target.files[0]);
        }

        window.onload = updateProgress;
    </script>
</body>
</html>
