<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Karten Datenbank</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #ffffff; max-width: 1200px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; margin-bottom: 30px; }
        .top-controls { display: flex; gap: 15px; margin-bottom: 40px; }
        .search-bar { flex-grow: 1; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .btn { padding: 10px 20px; border-radius: 5px; cursor: pointer; border: none; font-weight: bold; color: white; }
        .btn-export { background-color: #3498db; }
        .btn-import { background-color: #95a5a6; }
        .set-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card-wrapper { text-decoration: none; color: inherit; display: flex; flex-direction: column; }
        .set-card {
            background-color: #f8f9fa; border: 1px solid #e9ecef; border-radius: 8px;
            padding: 20px; text-align: center; min-height: 200px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 0.2s;
        }
        .set-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .set-card img { width: 100%; height: 100px; object-fit: contain; margin-bottom: 15px; }
        .progress-section { margin-top: 10px; font-size: 0.85em; color: #666; }
        .progress-bar { height: 8px; background: #eee; border-radius: 4px; overflow: hidden; margin-bottom: 4px; }
        .progress-fill { height: 100%; background: #2ecc71; width: 0%; transition: width 0.5s; }
        .stats { display: flex; justify-content: space-between; }
        #importFile { display: none; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>Pokémon Karten Datenbank</h1>
    <div class="top-controls">
        <input type="text" id="searchInput" class="search-bar" placeholder="Nach Set suchen..." onkeyup="filterSets()">
        <button class="btn btn-export" onclick="exportBackup()">Sichern</button>
        <button class="btn btn-import" onclick="document.getElementById('importFile').click()">Laden</button>
        <input type="file" id="importFile" accept=".json" onchange="importBackup(event)">
    </div>

    <h2>Sets</h2>
    <div class="set-grid" id="setGrid">
        <a href="kartenliste.html?set=base1" class="card-wrapper" data-id="base1" data-total="102">
            <div class="set-card"><img src="bilder/base1.png" alt="Base Set"><h3>Base Set</h3></div>
            <div class="progress-section">
                <div class="progress-bar"><div class="progress-fill" id="fill-base1"></div></div>
                <div class="stats"><span id="perc-base1">0%</span><span id="stat-base1">000/102</span></div>
            </div>
        </a>

        <a href="kartenliste.html?set=base2" class="card-wrapper" data-id="base4" data-total="130">
            <div class="set-card"><img src="bilder/base2.png" alt="Base Set 2"><h3>Base Set 2</h3></div>
            <div class="progress-section">
                <div class="progress-bar"><div class="progress-fill" id="fill-base4"></div></div>
                <div class="stats"><span id="perc-base4">0%</span><span id="stat-base4">000/130</span></div>
            </div>
        </a>

        <a href="kartenliste.html?set=ex3" class="card-wrapper" data-id="ex3" data-total="109">
            <div class="set-card"><img src="bilder/ex3.png" alt="EX Ruby & Sapphire"><h3>EX Ruby & Sapphire</h3></div>
            <div class="progress-section">
                <div class="progress-bar"><div class="progress-fill" id="fill-ex3"></div></div>
                <div class="stats"><span id="perc-ex3">0%</span><span id="stat-ex3">000/109</span></div>
            </div>
        </a>

        <a href="kartenliste.html?set=xy12" class="card-wrapper" data-id="xy12" data-total="108">
            <div class="set-card"><img src="bilder/xy12.png" alt="Evolutions"><h3>Evolutions</h3></div>
            <div class="progress-section">
                <div class="progress-bar"><div class="progress-fill" id="fill-xy12"></div></div>
                <div class="stats"><span id="perc-xy12">0%</span><span id="stat-xy12">000/108</span></div>
            </div>
        </a>

        <a href="kartenliste.html?set=cel25" class="card-wrapper" data-id="cel25" data-total="25">
            <div class="set-card"><img src="bilder/cel25.png" alt="Celebrations"><h3>Celebrations</h3></div>
            <div class="progress-section">
                <div class="progress-bar"><div class="progress-fill" id="fill-cel25"></div></div>
                <div class="stats"><span id="perc-cel25">0%</span><span id="stat-cel25">000/025</span></div>
            </div>
        </a>
    </div>

    <script>
        function updateProgress() {
            document.querySelectorAll('.card-wrapper').forEach(set => {
                const setId = set.getAttribute('data-id');
                const total = parseInt(set.getAttribute('data-total'));
                let count = 0;
                
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    // Sucht nach Schlüsseln, die mit der Set-ID beginnen (z.B. base1-1)
                    if (key.startsWith(setId + '-') && localStorage.getItem(key) === 'true') {
                        count++;
                    }
                }
                
                const percent = total > 0 ? Math.round((count / total) * 100) : 0;
                
                // Elemente im DOM aktualisieren
                const fill = document.getElementById(`fill-${setId}`);
                const perc = document.getElementById(`perc-${setId}`);
                const stat = document.getElementById(`stat-${setId}`);
                
                if(fill) fill.style.width = percent + '%';
                if(perc) perc.innerText = percent + '%';
                if(stat) stat.innerText = `${String(count).padStart(3, '0')}/${total}`;
            });
        }

        function filterSets() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.card-wrapper').forEach(card => {
                const setName = card.querySelector('h3').innerText.toLowerCase();
                card.classList.toggle('hidden', !setName.includes(query));
            });
        }

        function exportBackup() {
            const data = {};
            for (let i = 0; i < localStorage.length; i++) { 
                data[localStorage.key(i)] = localStorage.getItem(localStorage.key(i)); 
            }
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `pokemon_sammlung_backup.json`;
            a.click();
        }

        function importBackup(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (confirm("Möchtest du dein Backup laden? Aktuelle Daten werden überschrieben.")) {
                        localStorage.clear();
                        for (const key in data) { localStorage.setItem(key, data[key]); }
                        location.reload();
                    }
                } catch (err) {
                    alert("Fehler beim Lesen der Datei.");
                }
            };
            reader.readAsText(file);
        }

        window.onload = updateProgress;
    </script>
</body>
</html>
