<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Karten Datenbank</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --container-bg: #ffffff;
            --card-bg: #f2f2f2;
            --dark-blue-gray: #1a2634;
            --light-blue-gray: #2c3e50;
            --accent-blue: #3498db;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        body.dark-mode {
            --bg-color: var(--dark-blue-gray);
            --text-color: #ecf0f1;
            --container-bg: var(--dark-blue-gray);
            --card-bg: var(--light-blue-gray);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { font-size: 2.5rem; text-align: center; margin-bottom: 20px; font-weight: 700; }

        .top-controls {
            width: 100%;
            max-width: 800px;
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        #search-input {
            width: 100%;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 1.1rem;
            text-align: center;
            font-family: inherit;
        }

        .button-group { display: flex; gap: 10px; }

        .btn {
            font-family: inherit;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            font-weight: bold;
            color: white;
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-export { background-color: var(--accent-blue); }
        .btn-import { background-color: #95a5a6; }

        #dark-mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--accent-blue);
            border: none;
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.4rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            line-height: 1;
        }

        .section-title { 
            width: 100%;
            text-align: center;
            font-size: 1.8rem; 
            margin: 40px 0 30px 0; 
            border-bottom: 2px solid var(--accent-blue);
            padding-bottom: 10px;
        }

        .sets-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            width: 100%;
            margin-bottom: 50px;
        }

        .card-wrapper {
            text-decoration: none !important;
            color: inherit !important;
            display: block;
            transition: filter 0.5s ease;
        }

      /* 1. Die Kachel ist grau, wenn keine Karten gesammelt wurden */
        .card-wrapper.set-locked {
            filter: grayscale(100%) opacity(0.6) !important;
            transition: filter 0.3s ease, opacity 0.3s ease; /* Macht den Übergang weich */
        }

/* 2. DIESER TEIL FEHLTE: Beim Hovern wird die Farbe wieder sichtbar */
        .card-wrapper.set-locked:hover {
            filter: grayscale(20%) opacity(1) !important; /* Fast volle Farbe beim Drüberfahren */
        }
        .set-card-box {
            background-color: var(--card-bg);
            border-radius: 15px;
            height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s, box-shadow 0.2s;
            padding: 15px;
        }
        .set-card-box:hover { 
            transform: scale(1.03); 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .set-card-box img { max-width: 90%; max-height: 100px; object-fit: contain; }
        .set-card-box h3 { margin-top: 15px; font-size: 1.1rem; text-align: center; }

        .progress-section { margin-top: 15px; width: 100%; }
        .progress-bar { background-color: #e0e0e0; height: 8px; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background-color: #2ecc71; width: 0%; transition: width 0.6s ease; }
        .stats { display: flex; justify-content: space-between; margin-top: 8px; font-size: 0.85rem; font-weight: 600; }

        #importFile, .hidden { display: none; }
    </style>
</head>
<body>
    <button id="dark-mode-toggle" onclick="toggleDarkMode()">🌓</button>

    <div class="container">
        <h1>Pokémon Karten Datenbank</h1>
        
        <div class="top-controls">
            <input type="text" id="search-input" placeholder="Nach Set suchen..." onkeyup="filterSets()">
            <div class="button-group">
                <button class="btn btn-export" onclick="exportBackup()">Sichern</button>
                <button class="btn btn-import" onclick="document.getElementById('importFile').click()">Laden</button>
            </div>
            <input type="file" id="importFile" accept=".json" onchange="importBackup(event)">
        </div>

        <h2 class="section-title">Englische & Deutsche Sets</h2>
        <div class="sets-grid">
            <a href="kartenliste.html?set=base4&name=Base Set 2" class="card-wrapper" data-id="base4" data-total="130">
                <div class="set-card-box"><img src="bilder/base4.png"><h3>Base Set 2</h3></div>
                <div class="progress-section">
                    <div class="progress-bar"><div class="progress-fill" id="fill-base4"></div></div>
                    <div class="stats"><span id="perc-base4">0%</span><span id="stat-base4">0/130</span></div>
                </div>
            </a>

            <a href="kartenliste.html?set=ex1&name=EX Ruby Sapphire" class="card-wrapper" data-id="ex1" data-total="109">
                <div class="set-card-box"><img src="bilder/ex1.png"><h3>EX Ruby & Sapphire</h3></div>
                <div class="progress-section">
                    <div class="progress-bar"><div class="progress-fill" id="fill-ex1"></div></div>
                    <div class="stats"><span id="perc-ex1">0%</span><span id="stat-ex1">0/109</span></div>
                </div>
            </a>

            <a href="kartenliste.html?set=xy12&name=Evolutions" class="card-wrapper" data-id="xy12" data-total="113">
                <div class="set-card-box"><img src="bilder/xy12.png"><h3>Evolutions</h3></div>
                <div class="progress-section">
                    <div class="progress-bar"><div class="progress-fill" id="fill-xy12"></div></div>
                    <div class="stats"><span id="perc-xy12">0%</span><span id="stat-xy12">0/113</span></div>
                </div>
            </a>

            <a href="kartenliste.html?set=cel25&name=Celebrations" class="card-wrapper" data-id="cel25" data-total="25">
                <div class="set-card-box"><img src="bilder/cel25.png"><h3>Celebrations</h3></div>
                <div class="progress-section">
                    <div class="progress-bar"><div class="progress-fill" id="fill-cel25"></div></div>
                    <div class="stats"><span id="perc-cel25">0%</span><span id="stat-cel25">0/25</span></div>
                </div>
            </a>

            <a href="kartenliste.html?set=swsh45&name=Shining Fates" class="card-wrapper" data-id="swsh45" data-total="195">
                <div class="set-card-box"><img src="bilder/swsh45.png"><h3>Shining Fates</h3></div>
                <div class="progress-section">
                    <div class="progress-bar"><div class="progress-fill" id="fill-swsh45"></div></div>
                    <div class="stats"><span id="perc-swsh45">0%</span><span id="stat-swsh45">0/195</span></div>
                </div>
            </a>
        </div>

        <h2 class="section-title">Japanische Sets</h2>
        <div class="sets-grid">
            <a href="kartenliste.html?set=sm10b&name=Sky Legends" class="card-wrapper" data-id="sm10b" data-total="69">
                <div class="set-card-box"><img src="bilder/sm10b.png"><h3>Sky Legends</h3></div>
                <div class="progress-section">
                    <div class="progress-bar"><div class="progress-fill" id="fill-sm10b"></div></div>
                    <div class="stats"><span id="perc-sm10b">0%</span><span id="stat-sm10b">0/69</span></div>
                </div>
            </a>

            <a href="kartenliste.html?set=sm11&name=Miracle Twins" class="card-wrapper" data-id="sm11" data-total="115">
                <div class="set-card-box"><img src="bilder/sm11.png"><h3>Miracle Twins</h3></div>
                <div class="progress-section">
                    <div class="progress-bar"><div class="progress-fill" id="fill-sm11"></div></div>
                    <div class="stats"><span id="perc-sm11">0%</span><span id="stat-sm11">0/115</span></div>
                </div>
            </a>

            <a href="kartenliste.html?set=sm11a&name=Remix Bout" class="card-wrapper" data-id="sm11a" data-total="80">
                <div class="set-card-box"><img src="bilder/sm11a.png"><h3>Remix Bout</h3></div>
                <div class="progress-section">
                    <div class="progress-bar"><div class="progress-fill" id="fill-sm11a"></div></div>
                    <div class="stats"><span id="perc-sm11a">0%</span><span id="stat-sm11a">0/80</span></div>
                </div>
            </a>

            <a href="kartenliste.html?set=smp2&name=Det. Pikachu" class="card-wrapper" data-id="smp2" data-total="24">
                <div class="set-card-box"><img src="bilder/smp2.png"><h3>Det. Pikachu</h3></div>
                <div class="progress-section">
                    <div class="progress-bar"><div class="progress-fill" id="fill-smp2"></div></div>
                    <div class="stats"><span id="perc-smp2">0%</span><span id="stat-smp2">0/24</span></div>
                </div>
            </a>
        </div>
    </div>

    <script>
        // DARK MODE INITIALISIERUNG
        function initDarkMode() {
            if (localStorage.getItem('darkMode') === 'enabled') {
                document.body.classList.add('dark-mode');
            }
        }

        function toggleDarkMode() {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', isDark ? 'enabled' : 'disabled');
        }

        // FORTSCHRITT AKTUALISIEREN
        function updateHomeProgress() {
            document.querySelectorAll('.card-wrapper').forEach(set => {
                const setId = set.getAttribute('data-id');
                const total = parseInt(set.getAttribute('data-total'));
                const saved = localStorage.getItem(`owned_${setId}`);
                
                let count = 0;
                if (saved) {
                    const ownedCards = JSON.parse(saved);
                    count = ownedCards.length;
                }

                const percent = total > 0 ? Math.round((count / total) * 100) : 0;

                // DOM-Elemente updaten
                const fill = document.getElementById(`fill-${setId}`);
                const perc = document.getElementById(`perc-${setId}`);
                const stat = document.getElementById(`stat-${setId}`);

                if (fill) fill.style.width = percent + '%';
                if (perc) perc.innerText = percent + '%';
                if (stat) stat.innerText = `${count}/${total}`;

                // Ausgrauen Logik
                if (count === 0) {
                    set.classList.add('set-locked');
                } else {
                    set.classList.remove('set-locked');
                }
            });
        }

        // SUCHE
        function filterSets() {
            const query = document.getElementById('search-input').value.toLowerCase();
            document.querySelectorAll('.card-wrapper').forEach(card => {
                const setName = card.querySelector('h3').innerText.toLowerCase();
                card.classList.toggle('hidden', !setName.includes(query));
            });
        }

        // BACKUP FUNKTIONEN
        function exportBackup() {
            const data = {};
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                data[key] = localStorage.getItem(key);
            }
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'pokemon_backup.json';
            a.click();
        }

        function importBackup(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    localStorage.clear();
                    for (const key in data) {
                        localStorage.setItem(key, data[key]);
                    }
                    location.reload();
                } catch(err) {
                    alert("Ungültige Backup-Datei!");
                }
            };
            reader.readAsText(file);
        }

        // EVENTS
        window.addEventListener('DOMContentLoaded', () => {
            initDarkMode();
            updateHomeProgress();
        });
        window.addEventListener('pageshow', updateHomeProgress);
    </script>
</body>
</html>
