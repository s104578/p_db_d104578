    /* Der Container zentriert alles auf der Seite */
    .container {

        display: flex;

        align-items: center; /* Zentriert Kinder-Elemente horizontal */
    }

    /* Zentriert die Hauptüberschrift */
    h1 {
        text-align: center;
        width: 100%;
        margin-bottom: 20px;
        font-size: 2.5rem;
    }

    /* Zentriert die Hauptüberschrift */
    h1 {
        text-align: center;
        width: 100%;
        margin-bottom: 20px;
        font-size: 2.5rem;
    }

    /* Suchbereich: Exakt so breit wie das Grid (1200px) */
   .top-controls {
    width: 100%;
    max-width: 1200px; /* Exakt die Breite der 4 Kacheln */
    margin: 0 auto 40px auto; /* Zentriert die Sektion und gibt Abstand nach unten */
    display: flex;
    flex-direction: column; /* Stapelt Suche und Buttons übereinander für bessere Kontrolle */
    align-items: center;
    gap: 20px;
}

    /* Das eigentliche Suchfeld */
    #search-input {
    width: 100%; /* Suchleiste streckt sich über die gesamte Breite des Containers */
    padding: 15px 20px;
    border: 1px solid #ccc;
    border-radius: 10px;
    font-size: 1.1rem;
    text-align: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}
    .search-wrapper {
    width: 100%; /* Nutzt die vollen 1200px */
    display: flex;
    justify-content: center;
}
    /* Buttons */
   .btn { 
        padding: 12px 25px; 
        border-radius: 8px; 
        cursor: pointer; 
        border: none; 
        font-weight: bold; 
        color: white; 
        white-space: nowrap;
    }
    .btn-export { background-color: #3498db; }
    .btn-import { background-color: #95a5a6; }

    /* Zentrierte Sektionstitel */
    .section-title {
        width: 100%;
        text-align: center;
        font-size: 1.8rem;
        font-weight: bold;
        margin: 40px 0 30px 0;
        color: #000;
    }

    /* Das Grid für 4 Kacheln nebeneinander */
    .sets-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 25px;
        width: 100%;
        margin-bottom: 60px;
    }

    /* Kachel-Design */
    .card-wrapper {
        text-decoration: none !important;
        color: #000 !important;
        display: block;
    }

    .set-card-box {
        background-color: #f2f2f2;
        border-radius: 15px;
        height: 200px; /* Leicht erhöht für bessere Optik */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        transition: transform 0.2s ease;
    }

    .set-card-box:hover {
        transform: scale(1.03);
    }

    .set-card-box img {
        max-width: 80%;
        max-height: 110px;
        object-fit: contain;
    }

    .set-card-box h3 {
        margin-top: 15px;
        font-size: 1.1rem;
        font-weight: 600;
        text-align: center;
    }

    /* Fortschritt unter der Kachel */
    .progress-section {
        margin-top: 12px;
        width: 100%;
    }

    .progress-bar {
        background-color: #e0e0e0;
        height: 8px;
        border-radius: 4px;
        width: 100%;
        overflow: hidden;
    }

    .progress-fill {
    height: 100%;
    background-color: #2ecc71; /* Ein schönes Pokémon-Grün */
    width: 0%; /* Startwert */
    transition: width 0.5s ease-in-out; /* Macht das Laden des Balkens geschmeidig */
}

    .stats {
        display: flex;
        justify-content: space-between;
        margin-top: 6px;
        font-size: 0.85rem;
        font-weight: 500;
    }

    /* Versteckte Elemente */
    #importFile, .hidden { display: none; }
</style>
</head>

    <script>
        function updateProgress() {
            document.querySelectorAll('.card-wrapper').forEach(set => {
                const storageId = set.getAttribute('data-id');
                const total = parseInt(set.getAttribute('data-total'));
                let count = 0;
                
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key.startsWith(storageId + '-') && localStorage.getItem(key) === 'true') {
                        count++;
                    }
                }
                
                const percent = Math.round((count / total) * 100) || 0;
                
                const fillElement = document.getElementById(`fill-${storageId}`);
                const percElement = document.getElementById(`perc-${storageId}`);
                const statElement = document.getElementById(`stat-${storageId}`);

                if (fillElement) fillElement.style.width = percent + '%';
                if (percElement) percElement.innerText = percent + '%';
                if (statElement) statElement.innerText = `${String(count).padStart(3, '0')}/${total}`;
            });
        }

        function filterSets() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.card-wrapper').forEach(card => {
                const setName = card.querySelector('h3').innerText.toLowerCase();
                card.classList.toggle('hidden', !setName.includes(query));
            });
        }

        function exportBackup() {
            const data = {};
            for (let i = 0; i < localStorage.length; i++) { 
                data[localStorage.key(i)] = localStorage.getItem(localStorage.key(i)); 
            }
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `pokemon_backup.json`;
            a.click();
        }

        function importBackup(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    localStorage.clear();
                    for (const key in data) { localStorage.setItem(key, data[key]); }
                    location.reload();
                } catch(err) { alert("Fehler beim Import!"); }
            };
            reader.readAsText(event.target.files[0]);
        }

        window.onload = updateProgress;
    </script>
    <script>
function updateHomeProgress() {
    // Alle Kacheln (card-wrapper) finden
    const sets = document.querySelectorAll('.card-wrapper');

    sets.forEach(set => {
        const setId = set.getAttribute('data-id');
        const totalCards = parseInt(set.getAttribute('data-total'));
        
        // Die gespeicherten Daten aus dem localStorage holen
        const savedData = localStorage.getItem('pokemon_collection_' + setId);
        let collectedCount = 0;

        if (savedData) {
            const collectedCards = JSON.parse(savedData);
            // Wir zählen nur die Einträge, die auf 'true' stehen
            collectedCount = Object.values(collectedCards).filter(status => status === true).length;
        }

        // Prozent berechnen
        const percent = totalCards > 0 ? Math.round((collectedCount / totalCards) * 100) : 0;

        // Die Elemente in dieser speziellen Kachel finden und updaten
        const fillBar = document.getElementById('fill-' + setId);
        const percText = document.getElementById('perc-' + setId);
        const statText = document.getElementById('stat-' + setId);

        if (fillBar) fillBar.style.width = percent + '%';
        if (percText) percText.textContent = percent + '%';
        if (statText) statText.textContent = collectedCount + '/' + totalCards;
    });
}

// Ausführen, sobald die Seite geladen ist
window.addEventListener('pageshow', updateHomeProgress);
</script>
