<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Kartenliste</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        
        .container {
            width: 100%;
            max-width: 1000px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
        }

        /* Zurück Button oben links */
        .back-nav {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .btn-back {
            text-decoration: none;
            color: #333;
            background: #eee;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .btn-back:hover { background: #ddd; }

        .header-section { text-align: center; margin-bottom: 20px; }
        #set-logo { max-height: 100px; margin-bottom: 10px; }
        h1 { margin: 10px 0; font-size: 2rem; color: #333; }

        .progress-container { margin-bottom: 25px; text-align: center; }
        .progress-bar-bg { background: #e0e0e0; height: 12px; border-radius: 6px; overflow: hidden; margin-top: 10px; }
        .progress-bar-fill { background: #4CAF50; height: 100%; width: 0%; transition: width 0.5s; }

        .controls { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
        #search-input { flex-grow: 1; padding: 12px; border: 1px solid #3498db; border-radius: 8px; }

        table { width: 100%; border-collapse: collapse; }
        th { background-color: #3498db; color: white; padding: 15px; text-align: center; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; vertical-align: middle; }

        /* Automatischer Hover-Zoom für Kartenbilder */
        .img-container { position: relative; width: 50px; margin: 0 auto; }
        .card-img { 
            width: 50px; 
            border-radius: 4px; 
            transition: transform 0.2s ease-in-out, box-shadow 0.2s;
            cursor: pointer;
            z-index: 1;
        }

        .card-img:hover { 
            transform: scale(5); /* Vergrößert das Bild auf das 5-fache */
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            z-index: 100;
            position: relative;
        }

        input[type="checkbox"] { transform: scale(1.5); cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="back-nav">
        <a href="index.html" class="btn-back">← Zurück</a>
    </div>

    <div class="header-section">
        <img id="set-logo" src="" alt="">
        <h1 id="set-title">Lade...</h1>
        <div id="stats-text">0 / 0 Karten gesammelt (0%)</div>
    </div>

    <div class="progress-container">
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
    </div>

    <div class="controls">
        <input type="text" id="search-input" placeholder="Name oder Nummer suchen...">
        <div style="background:#eee; padding:10px; border-radius:8px; white-space:nowrap;">
            Alle wählen: <input type="checkbox" id="select-all">
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Bild</th>
                <th>Nr.</th>
                <th>Name</th>
                <th>Seltenheit</th>
                <th>Besitz</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const setId = urlParams.get('set');
    const storageKey = `owned_${setId}`;
    let allCards = [];

   async function init() {
    if (!setId) return;

    // 1. Logo setzen
    const logo = document.getElementById('set-logo');
    logo.src = `bilder/${setId}.png`;

    // 2. Set-Namen aus der URL holen
    const setNameFromUrl = urlParams.get('name');
    if (setNameFromUrl) {
        document.getElementById('set-title').innerText = setNameFromUrl;
    }

    try {
        const response = await fetch(`daten/${setId}.json`);
        allCards = await response.json();
        
        // Falls kein Name in der URL war, versuche ihn aus der JSON zu lesen
        if (!setNameFromUrl) {
            document.getElementById('set-title').innerText = allCards[0]?.setName || setId.toUpperCase();
        }
        
        renderTable(allCards);
        updateProgress();
    } catch (e) {
        console.error("Fehler beim Laden der JSON:", e);
        document.getElementById('table-body').innerHTML = '<tr><td colspan="5">Fehler beim Laden der Kartendaten.</td></tr>';
    }
}
    function renderTable(cards) {
        const tbody = document.getElementById('table-body');
        const owned = JSON.parse(localStorage.getItem(storageKey)) || [];
        tbody.innerHTML = '';

        cards.forEach(card => {
            const tr = document.createElement('tr');
            const isOwned = owned.includes(card.id);
            const imgUrl = `https://images.pokemontcg.io/${setId}/${card.n}.png`;

            tr.innerHTML = `
                <td><div class="img-container"><img src="${imgUrl}" class="card-img"></div></td>
                <td>${card.n}</td>
                <td>${card.nameDE || card.name}</td>
                <td>${card.r || '-'}</td>
                <td><input type="checkbox" ${isOwned ? 'checked' : ''} onchange="toggleCard('${card.id}')"></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function toggleCard(id) {
        let owned = JSON.parse(localStorage.getItem(storageKey)) || [];
        owned = owned.includes(id) ? owned.filter(i => i !== id) : [...owned, id];
        localStorage.setItem(storageKey, JSON.stringify(owned));
        updateProgress();
    }

    function updateProgress() {
        const owned = JSON.parse(localStorage.getItem(storageKey)) || [];
        const percent = Math.round((owned.length / allCards.length) * 100) || 0;
        document.getElementById('progress-fill').style.width = percent + '%';
        document.getElementById('stats-text').innerText = `${owned.length} / ${allCards.length} Karten gesammelt (${percent}%)`;
    }

    document.getElementById('search-input').oninput = (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = allCards.filter(c => (c.nameDE || c.name).toLowerCase().includes(term) || c.n.toString().includes(term));
        renderTable(filtered);
    };

    document.getElementById('select-all').onchange = (e) => {
        const owned = e.target.checked ? allCards.map(c => c.id) : [];
        localStorage.setItem(storageKey, JSON.stringify(owned));
        renderTable(allCards);
        updateProgress();
    };

    init();
</script>
</body>
</html>
