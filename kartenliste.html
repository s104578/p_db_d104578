<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartenliste</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 1000px; margin: 0 auto; padding: 20px; }
        .back { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #0078d7; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .card-img { width: 60px; height: 84px; object-fit: contain; cursor: zoom-in; transition: transform 0.2s; background: #f9f9f9; }
        .card-img:hover { transform: scale(4); position: relative; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .loading-box { text-align: center; padding: 50px; color: #888; border: 1px dashed #ccc; border-radius: 10px; }
        .error-msg { color: #e74c3c; font-weight: bold; text-align: center; padding: 20px; border: 1px solid; border-radius: 5px; }
    </style>
</head>
<body>
    <a href="index.html" class="back">← Zurück zur Übersicht</a>
    <h1 id="setTitle">Warte auf API...</h1>
    
    <div id="loadingStatus" class="loading-box">Verbinde mit Pokémon-Datenbank...</div>

    <table id="cardTable" style="display: none;">
        <thead><tr><th>Bild</th><th>Nr.</th><th>Name</th><th>Seltenheit</th><th>Besitz</th></tr></thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        const API_KEY = "210128f2-1114-47d0-805d-4e9dd5c364dc";
        const urlParams = new URLSearchParams(window.location.search);
        const setId = urlParams.get('set') || 'base2';

        // Wir nutzen eine robustere Methode für die API
        async function loadData() {
            const statusDiv = document.getElementById('loadingStatus');
            
            // 1. Versuch: Aus dem Zwischenspeicher (Prefetch)
            const cached = sessionStorage.getItem('data-' + setId);
            if (cached) {
                renderTable(JSON.parse(cached));
                return;
            }

            // 2. Versuch: Direkte API-Anfrage mit verstärkten Headern
            try {
                const response = await fetch(`https://api.pokemontcg.io/v2/cards?q=set.id:${setId}&orderBy=number`, {
                    method: 'GET',
                    mode: 'cors', // Wichtig für GitHub Pages
                    headers: {
                        'X-Api-Key': API_KEY,
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`Server antwortet mit Status ${response.status}`);
                }

                const result = await response.json();
                if (!result.data || result.data.length === 0) {
                    throw new Error("Keine Karten für dieses Set gefunden.");
                }

                sessionStorage.setItem('data-' + setId, JSON.stringify(result.data));
                renderTable(result.data);

            } catch (err) {
                console.error("Fetch Error:", err);
                statusDiv.innerHTML = `
                    <div class="error-msg">
                        Fehler beim Laden: ${err.message}<br>
                        <small>Tipp: Falls du am PC bist, drücke einmal STRG + F5, um den Cache zu leeren.</small>
                    </div>`;
            }
        }

        function renderTable(cards) {
            const body = document.getElementById('tableBody');
            body.innerHTML = '';
            document.getElementById('setTitle').innerText = cards[0].set.name;
            
            cards.forEach(card => {
                const isOwned = localStorage.getItem(card.id) === 'true';
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><img src="${card.images.small}" class="card-img" loading="lazy"></td>
                    <td>${card.number}</td>
                    <td><strong>${card.name}</strong></td>
                    <td>${card.rarity || 'Common'}</td>
                    <td><input type="checkbox" ${isOwned ? 'checked' : ''} onchange="localStorage.setItem('${card.id}', this.checked)"></td>
                `;
                body.appendChild(row);
            });
            document.getElementById('loadingStatus').style.display = 'none';
            document.getElementById('cardTable').style.display = 'table';
        }

        // Start
        loadData();
    </script>
</body>
</html>
