<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Kartenliste</title>
    <style>
        :root {
            --bg-color: #f4f7f9;
            --text-color: #333333;
            --container-bg: #ffffff;
            --dark-blue-gray: #1a2634;
            --light-blue-gray: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 20px;
            display: flex; justify-content: center;
            transition: background-color 0.3s;
        }

        body.dark-mode {
            --bg-color: var(--dark-blue-gray);
            --text-color: #ecf0f1;
            --container-bg: var(--light-blue-gray);
        }
/* Modal & 3D Container */
.modal {
    display: none; 
    position: fixed;
    z-index: 2000;
    left: 0; top: 0; width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.9);
    align-items: center;
    justify-content: center;
    perspective: 1000px; /* Wichtig für 3D */
}

.card-flip-container {
    width: 350px; /* Größere Darstellung */
    height: 490px;
    position: relative;
    transition: transform 0.6s;
    transform-style: preserve-3d;
    cursor: pointer;
}

/* Drehung auslösen */
.card-flip-container.is-flipped {
    transform: rotateY(180px);
}

.card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

/* Vorderseite */
.card-front img {
    width: 100%;
    height: 100%;
    border-radius: 15px;
    object-fit: contain;
}

/* Rückseite */
.card-back {
    background: #2c3e50;
    color: white;
    transform: rotateY(180deg);
    border: 5px solid #34495e;
    padding: 20px;
    text-align: center;
}

.card-back img {
    max-width: 150px;
    margin-bottom: 20px;
    filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
}

.card-back h2 { color: #3498db; margin: 10px 0; }

/* Das eigentliche Bild im Modal */
.modal-content {
    max-width: 90%;
    max-height: 85vh;
    border-radius: 15px;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
    transform: scale(0.8);
    transition: transform 0.3s ease;
}

.modal.show .modal-content {
    transform: scale(1);
}

/* Schließen-Button (optional, da man auch einfach klicken kann) */
.close-modal {
    position: absolute;
    top: 20px;
    right: 30px;
    color: white;
    font-size: 40px;
    font-weight: bold;
}
        .container {
            width: 100%; max-width: 1000px;
            background: var(--container-bg);
            padding: 30px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
        }

        .back-nav { position: absolute; top: 20px; left: 20px; }
        .btn-back { 
            text-decoration: none; color: inherit; background: rgba(0,0,0,0.1); 
            padding: 8px 15px; border-radius: 8px; font-weight: bold; 
        }

        .header-section { text-align: center; margin-bottom: 20px; }
        #set-logo { max-height: 100px; margin-bottom: 10px; }

        .progress-bar-bg { background: #e0e0e0; height: 12px; border-radius: 6px; overflow: hidden; margin-top: 10px; }
        .progress-bar-fill { background: #2ecc71; height: 100%; width: 0%; transition: width 0.5s; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background-color: #3498db; color: white; padding: 15px; }
        td { padding: 10px; border-bottom: 1px solid rgba(0,0,0,0.1); text-align: center; }

        .card-img { width: 50px; border-radius: 4px; transition: transform 0.2s; cursor: pointer; }
        .card-img:hover { transform: scale(5); z-index: 100; position: relative; }

        input[type="checkbox"] { transform: scale(1.5); cursor: pointer; }

        #dark-mode-toggle {
            position: fixed; top: 20px; right: 20px;
            background: #3498db; border: none; padding: 10px; border-radius: 50%;
            cursor: pointer; font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <button id="dark-mode-toggle" onclick="toggleDarkMode()">🌓</button>

    <div class="container">
        <div class="back-nav"><a href="index.html" class="btn-back">← Zurück</a></div>
        
        <div class="header-section">
            <img id="set-logo" src="">
            <h1 id="set-title">Lade...</h1>
            <div id="stats-text">0 / 0 Karten (0%)</div>
            <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
        </div>

        <div style="display:flex; gap:10px; margin: 20px 0;">
            <input type="text" id="search-input" placeholder="Suchen..." style="flex-grow:1; padding:10px; border-radius:8px; border:1px solid #ccc;">
            <div style="background:rgba(0,0,0,0.05); padding:10px; border-radius:8px;">
                Alle: <input type="checkbox" id="select-all">
            </div>
        </div>

        <table>
            <thead><tr><th>Bild</th><th>Nr.</th><th>Name</th><th>Seltenheit</th><th>Besitz</th></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
    const urlParams = new URLSearchParams(window.location.search);
    const setId = urlParams.get('set'); // z.B. "base1" oder "tr1"
    const storageKey = `owned_${setId}`;
    let allCards = [];

    function toggleDarkMode() {
        const isDark = document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', isDark ? 'enabled' : 'disabled');
    }

    // Diese Funktion wandelt deine IDs (z.B. base1-1) in API-Links um
    function getCardImageUrl(cardId) {
        if (!cardId) return '';
        const parts = cardId.split('-');
        const sId = parts[0];
        const cardNumber = parts[1];
        return `https://images.pokemontcg.io/${sId}/${cardNumber}.png`;
    }

    async function init() {
        if (localStorage.getItem('darkMode') === 'enabled') document.body.classList.add('dark-mode');
        
        // Korrektur: Set-Logo bleibt lokal, Titel kommt aus URL
        document.getElementById('set-logo').src = `bilder/${setId}.png`;
        document.getElementById('set-title').innerText = urlParams.get('name') || "Set";

        try {
            const res = await fetch(`daten/${setId}.json`);
            if (!res.ok) throw new Error('Daten konnten nicht geladen werden');
            allCards = await res.json();
            renderTable(allCards);
            updateProgress();
        } catch (error) {
            console.error("Fehler beim Laden:", error);
            document.getElementById('stats-text').innerText = "Fehler beim Laden der Kartenliste.";
        }
    }

    function renderTable(cards) {
        const tbody = document.getElementById('table-body');
        const owned = JSON.parse(localStorage.getItem(storageKey)) || [];
        
        tbody.innerHTML = cards.map(card => {
            // Wir nutzen hier die universelle Funktion für das Kartenbild
            const apiImgUrl = getCardImageUrl(card.id);
            
            return `
                <tr>
                    <td>
    <img src="${apiImgUrl}" 
         class="card-img" 
         loading="lazy" 
         style="cursor: pointer;" 
         onclick="openModal('${apiImgUrl}')" 
         onerror="this.src='bilder/placeholder.png'">
</td>
                    <td>${card.n}</td>
                    <td>${card.nameDE || card.name}</td>
                    <td>${card.r || '-'}</td>
                    <td><input type="checkbox" ${owned.includes(card.id) ? 'checked' : ''} onchange="toggleCard('${card.id}')"></td>
                </tr>
            `;
        }).join('');
    }

    function toggleCard(id) {
        let owned = JSON.parse(localStorage.getItem(storageKey)) || [];
        owned = owned.includes(id) ? owned.filter(i => i !== id) : [...owned, id];
        localStorage.setItem(storageKey, JSON.stringify(owned));
        updateProgress();
    }

    function updateProgress() {
        const owned = JSON.parse(localStorage.getItem(storageKey)) || [];
        if (allCards.length === 0) return;
        const p = Math.round((owned.length / allCards.length) * 100) || 0;
        document.getElementById('progress-fill').style.width = p + '%';
        document.getElementById('stats-text').innerText = `${owned.length} / ${allCards.length} Karten (${p}%)`;
    }
function openModal(imgSrc) {
    const modal = document.getElementById("imageModal");
    const container = document.getElementById("flipContainer");
    
    // Daten befüllen
    document.getElementById("modalImg").src = imgSrc;
    document.getElementById("modalSetLogo").src = `bilder/${setId}.png`;
    document.getElementById("modalSetName").innerText = urlParams.get('name') || "Pokémon Set";
    document.getElementById("modalStats").innerText = document.getElementById('stats-text').innerText;

    // Reset Flip-Status
    container.classList.remove('is-flipped');
    
    modal.style.display = "flex";
}

// Karte drehen
function toggleFlip(event) {
    event.stopPropagation(); // Verhindert, dass das Modal schließt
    document.getElementById("flipContainer").classList.toggle('is-flipped');
}

// Modal schließen wenn man daneben klickt
function handleModalClick(event) {
    document.getElementById("imageModal").style.display = "none";
}

function closeModal() {
    const modal = document.getElementById("imageModal");
    modal.classList.remove('show');
    setTimeout(() => {
        modal.style.display = "none";
    }, 300);
}
    document.getElementById('search-input').oninput = (e) => {
        const term = e.target.value.toLowerCase();
        renderTable(allCards.filter(c => 
            (c.nameDE || c.name || "").toLowerCase().includes(term) || 
            (c.n || "").toString().includes(term)
        ));
    };

    document.getElementById('select-all').onchange = (e) => {
        localStorage.setItem(storageKey, JSON.stringify(e.target.checked ? allCards.map(c => c.id) : []));
        renderTable(allCards); 
        updateProgress();
    };

    init();
</script>
   <div id="imageModal" class="modal" onclick="handleModalClick(event)">
    <div class="card-flip-container" id="flipContainer" onclick="toggleFlip(event)">
        <div class="card-face card-front">
            <img id="modalImg" src="">
        </div>
        <div class="card-face card-back">
            <img id="modalSetLogo" src="">
            <h2 id="modalSetName">Set Name</h2>
            <hr style="width: 80%; border: 0.5px solid #555;">
            <p id="modalStats" style="margin-top: 20px; font-size: 1.2rem;"></p>
            <p style="font-size: 0.8rem; color: #bdc3c7; margin-top: auto;">Klicke zum Wenden</p>
        </div>
    </div>
</div>
</body>
</html>
