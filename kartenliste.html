<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartenliste - Pokémon Sammlung</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #1a1a1a;
            color: white;
            margin: 0;
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .back-btn {
            text-decoration: none;
            color: white;
            background: #444;
            padding: 8px 15px;
            border-radius: 5px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .card-item {
            background: #2a2a2a;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
        }

        .card-item img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            /* Der ursprüngliche Graustufen-Filter */
            filter: grayscale(100%);
            opacity: 0.5;
        }

        .card-item.owned img {
            filter: grayscale(0%);
            opacity: 1;
        }

        .card-info {
            margin-top: 8px;
            font-size: 0.85rem;
        }

        #set-title {
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="set-title">Lade Set...</h1>
        <a href="index.html" class="back-btn">Zurück</a>
    </div>
    <p id="set-stats">0 / 0 Karten gesammelt</p>

    <div id="card-grid" class="grid"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const setId = urlParams.get('set');

        async function loadCards() {
            if (!setId) return;

            try {
                const response = await fetch(`daten/${setId}.json`);
                const cards = await response.json();

                // Lade Besitzstatus
                const storageKey = `owned_${setId}`;
                let ownedCards = JSON.parse(localStorage.getItem(storageKey)) || [];

                const grid = document.getElementById('card-grid');
                const setTitle = document.getElementById('set-title');
                
                setTitle.innerText = setId.toUpperCase();

                cards.forEach(card => {
                    const isOwned = ownedCards.includes(card.id);
                    const cardElement = document.createElement('div');
                    cardElement.className = `card-item ${isOwned ? 'owned' : ''}`;
                    
                    // API Bild-URL
                    const apiImageUrl = `https://images.pokemontcg.io/${setId}/${card.n}.png`;

                    cardElement.innerHTML = `
                        <img src="${apiImageUrl}" alt="${card.name}" loading="lazy">
                        <div class="card-info">
                            <div>#${card.n}</div>
                            <div>${card.nameDE || card.name}</div>
                        </div>
                    `;

                    cardElement.onclick = () => {
                        if (ownedCards.includes(card.id)) {
                            ownedCards = ownedCards.filter(id => id !== card.id);
                            cardElement.classList.remove('owned');
                        } else {
                            ownedCards.push(card.id);
                            cardElement.classList.add('owned');
                        }
                        localStorage.setItem(storageKey, JSON.stringify(ownedCards));
                        updateStats(cards.length, ownedCards.length);
                    };
                    
                    grid.appendChild(cardElement);
                });

                updateStats(cards.length, ownedCards.length);

            } catch (e) {
                console.error("Fehler:", e);
                document.getElementById('card-grid').innerText = "Set konnte nicht geladen werden.";
            }
        }

        function updateStats(total, owned) {
            document.getElementById('set-stats').innerText = `${owned} / ${total} Karten gesammelt`;
        }

        loadCards();
    </script>
</body>
</html>
