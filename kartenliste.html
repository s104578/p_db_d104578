<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartenliste</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 1000px; margin: 0 auto; padding: 20px; text-align: center; }
        .back { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #0078d7; font-weight: bold; float: left; }
        
        /* Pokéball-Animation */
        .loader-container { margin: 50px auto; display: flex; flex-direction: column; align-items: center; }
        .ball-loader {
            width: 80px; height: 80px;
            background-size: contain;
            background-repeat: no-repeat;
            animation: shake 0.8s infinite ease-in-out, changeBall 8s infinite steps(1);
        }
        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(-20deg); }
            50% { transform: rotate(20deg); }
            75% { transform: rotate(-20deg); }
            100% { transform: rotate(0deg); }
        }
        @keyframes changeBall {
            0% { background-image: url('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png'); }
            25% { background-image: url('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/great-ball.png'); }
            50% { background-image: url('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/ultra-ball.png'); }
            75% { background-image: url('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/master-ball.png'); }
        }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; text-align: left; display: none; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; }
        .card-img { width: 60px; height: 84px; object-fit: contain; cursor: zoom-in; transition: transform 0.2s; }
        .card-img:hover { transform: scale(4); position: relative; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        .error-box { display: none; color: #e74c3c; background: #fdf2f2; border: 1px solid #e74c3c; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .btn-retry { background: #0078d7; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <a href="index.html" class="back">← Zurück zur Übersicht</a>
    <h1 id="setTitle">Suche Karten...</h1>
    
    <div id="loader" class="loader-container">
        <div class="ball-loader"></div>
        <p id="statusText">Daten werden von der TCG-API gerufen...</p>
    </div>

    <div id="errorBox" class="error-box">
        <p><strong>Fehler beim Laden (Failed to Fetch)</strong></p>
        <p><small id="errorDetail">Mögliche Ursache: API-Blockade oder kein Internet.</small></p>
        <p>Probiere es mal im <b>Inkognito-Modus</b> oder mit <b>ausgeschaltetem AdBlocker</b>.</p>
        <button class="btn-retry" onclick="location.reload()">Erneut versuchen</button>
    </div>

    <table id="cardTable">
        <thead><tr><th>Bild</th><th>Nr.</th><th>Name</th><th>Seltenheit</th><th>Besitz</th></tr></thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        const API_KEY = "210128f2-1114-47d0-805d-4e9dd5c364dc";
        const urlParams = new URLSearchParams(window.location.search);
        const setId = urlParams.get('set') || 'base1';

        async function loadCards() {
            try {
                const cached = sessionStorage.getItem('data-' + setId);
                if (cached) {
                    renderTable(JSON.parse(cached));
                    return;
                }

                const response = await fetch(`https://api.pokemontcg.io/v2/cards?q=set.id:${setId}&orderBy=number`, {
                    headers: { 'X-Api-Key': API_KEY }
                });

                if (!response.ok) throw new Error("Status: " + response.status);
                
                const result = await response.json();
                sessionStorage.setItem('data-' + setId, JSON.stringify(result.data));
                renderTable(result.data);

            } catch (err) {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('errorBox').style.display = 'block';
                document.getElementById('errorDetail').innerText = err.message;
            }
        }

        function renderTable(cards) {
            const body = document.getElementById('tableBody');
            body.innerHTML = '';
            document.getElementById('setTitle').innerText = cards[0].set.name;
            
            cards.forEach(card => {
                const isOwned = localStorage.getItem(card.id) === 'true';
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><img src="${card.images.small}" class="card-img" loading="lazy"></td>
                    <td>${card.number}</td>
                    <td><strong>${card.name}</strong></td>
                    <td>${card.rarity || 'Common'}</td>
                    <td><input type="checkbox" ${isOwned ? 'checked' : ''} onchange="localStorage.setItem('${card.id}', this.checked)"></td>
                `;
                body.appendChild(row);
            });
            document.getElementById('loader').style.display = 'none';
            document.getElementById('cardTable').style.display = 'table';
        }

        loadCards();
    </script>
</body>
</html>
