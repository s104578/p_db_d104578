<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartenliste</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 1000px; margin: 0 auto; padding: 20px; }
        .back { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #0078d7; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .card-img { width: 60px; height: 84px; object-fit: contain; cursor: zoom-in; transition: transform 0.2s; }
        .card-img:hover { transform: scale(4); position: relative; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .loading { text-align: center; padding: 50px; color: #888; }
        .error { color: #e74c3c; font-weight: bold; text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <a href="index.html" class="back">← Zurück zur Übersicht</a>
    <h1 id="setTitle">Lade Set...</h1>
    
    <table>
        <thead>
            <tr><th>Bild</th><th>Nr.</th><th>Name</th><th>Seltenheit</th><th>Besitz</th></tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="5" class="loading" id="msg">Verbindung zur API wird aufgebaut...</td></tr>
        </tbody>
    </table>

    <script>
        // DEIN API KEY HIER EINTRAGEN
        const API_KEY = "8a7d064f-e555-4dc1-b9de-78f8f7124817"; 

        const urlParams = new URLSearchParams(window.location.search);
        const setId = urlParams.get('set') || 'base2';

        async function fetchCards() {
            try {
                const response = await fetch(`https://api.pokemontcg.io/v2/cards?q=set.id:${setId}&orderBy=number`, {
                    headers: { 'X-Api-Key': API_KEY }
                });
                
                if (!response.ok) throw new Error("API-Limit erreicht oder falscher Key.");
                
                const result = await response.json();
                renderTable(result.data);
            } catch (err) {
                document.getElementById('msg').innerHTML = `<span class="error">Fehler: ${err.message}</span>`;
            }
        }

        function renderTable(cards) {
            const body = document.getElementById('tableBody');
            body.innerHTML = '';
            document.getElementById('setTitle').innerText = cards[0].set.name;
            
            cards.forEach(card => {
                const isOwned = localStorage.getItem(card.id) === 'true';
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><img src="${card.images.small}" class="card-img"></td>
                    <td>${card.number}</td>
                    <td><strong>${card.name}</strong></td>
                    <td>${card.rarity || 'Common'}</td>
                    <td><input type="checkbox" ${isOwned ? 'checked' : ''} onchange="localStorage.setItem('${card.id}', this.checked)"></td>
                `;
                body.appendChild(row);
            });
        }

        fetchCards();
    </script>
</body>
</html>
