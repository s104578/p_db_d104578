<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartenliste - Pokémon Sammlung</title>
    <style>
        :root {
            --primary-color: #3d7dca;
            --secondary-color: #ffcb05;
            --bg-color: #1a1a1a;
            --card-bg: #2a2a2a;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #set-logo {
            max-height: 80px;
            max-width: 200px;
            object-fit: contain;
        }

        .header-info h1 {
            margin: 0;
            color: var(--secondary-color);
        }

        .back-btn {
            text-decoration: none;
            color: var(--text-color);
            background: var(--primary-color);
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .card-item {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            transition: transform 0.2s;
            cursor: pointer;
            position: relative;
        }

        .card-item:hover {
            transform: translateY(-5px);
        }

        .card-item img {
            width: 100%;
            height: auto;
            border-radius: 5px;
            margin-bottom: 10px;
            filter: grayscale(100%) opacity(0.3); /* Standard: Nicht im Besitz */
            transition: all 0.3s;
        }

        .card-item.owned img {
            filter: grayscale(0%) opacity(1); /* Im Besitz: Farbig */
        }

        .card-info {
            font-size: 0.9rem;
        }

        .card-number {
            color: var(--secondary-color);
            font-weight: bold;
        }

        /* Status-Indikator */
        .status-dot {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4444;
        }

        .owned .status-dot {
            background: #44ff44;
            box-shadow: 0 0 10px #44ff44;
        }

        #loading {
            text-align: center;
            font-size: 1.5rem;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn">← Zurück</a>
        <img id="set-logo" src="" alt="Set Logo">
        <div class="header-info">
            <h1 id="set-title">Lade Set...</h1>
            <p id="set-stats">Karten werden geladen...</p>
        </div>
    </div>

    <div id="loading">Karten werden geladen...</div>
    <div class="grid" id="card-grid"></div>

    <script>
        // Hilfsfunktion: Parameter aus URL lesen
        const urlParams = new URLSearchParams(window.location.search);
        const setId = urlParams.get('set');

        if (!setId) {
            window.location.href = 'index.html';
        }

        async function loadCards() {
            try {
                // 1. Lokales Set-Logo setzen
                const logoImg = document.getElementById('set-logo');
                logoImg.src = `bilder/${setId}.png`;
                logoImg.onerror = () => logoImg.style.display = 'none';

                // 2. JSON-Daten des Sets laden (aus deinem daten/ Ordner)
                const response = await fetch(`daten/${setId}.json`);
                const cards = await response.json();

                // 3. Speicherstand (LocalStorage) laden
                const storageKey = `owned_${setId}`;
                let ownedCards = JSON.parse(localStorage.getItem(storageKey)) || [];

                const grid = document.getElementById('card-grid');
                const loading = document.getElementById('loading');
                const setTitle = document.getElementById('set-title');
                
                loading.style.display = 'none';
                setTitle.innerText = setId.toUpperCase().replace('SM', 'Sun & Moon ');

                grid.innerHTML = '';

                cards.forEach(card => {
                    const isOwned = ownedCards.includes(card.id);
                    const cardElement = document.createElement('div');
                    cardElement.className = `card-item ${isOwned ? 'owned' : ''}`;
                    cardElement.setAttribute('data-card-id', card.id);

                    // API Bild-URL zusammenbauen
                    // Die API nutzt meist das Format: setId / cardNumber
                    // Wir nutzen card.n (Nummer aus der JSON)
                    const apiImageUrl = `https://images.pokemontcg.io/${setId}/${card.n}.png`;

                    cardElement.innerHTML = `
                        <div class="status-dot"></div>
                        <img src="${apiImageUrl}" alt="${card.name}" loading="lazy">
                        <div class="card-info">
                            <div class="card-number">#${card.n}</div>
                            <div>${card.nameDE || card.name}</div>
                            <small>${card.r}</small>
                        </div>
                    `;

                    // Klick-Event zum Markieren
                    cardElement.onclick = () => toggleCard(card.id, cardElement, storageKey);
                    
                    grid.appendChild(cardElement);
                });

                updateStats(cards.length, ownedCards.length);

            } catch (error) {
                console.error("Fehler beim Laden der Karten:", error);
                document.getElementById('loading').innerText = "Fehler beim Laden der Set-Daten.";
            }
        }

        function toggleCard(cardId, element, storageKey) {
            let ownedCards = JSON.parse(localStorage.getItem(storageKey)) || [];
            
            if (ownedCards.includes(cardId)) {
                ownedCards = ownedCards.filter(id => id !== cardId);
                element.classList.remove('owned');
            } else {
                ownedCards.push(cardId);
                element.classList.add('owned');
            }

            localStorage.setItem(storageKey, JSON.stringify(ownedCards));
            
            // Stats live aktualisieren
            const total = document.querySelectorAll('.card-item').length;
            updateStats(total, ownedCards.length);
        }

        function updateStats(total, owned) {
            const percent = Math.round((owned / total) * 100);
            document.getElementById('set-stats').innerText = 
                `${owned} von ${total} Karten gesammelt (${percent}%)`;
        }

        // Initialisierung
        loadCards();
    </script>
</body>
</html>
