<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Sammlungs-Tracker</title>
    <style>
        :root {
            --primary: #3498db;
            --secondary: #2ecc71;
            --bg: #f0f2f5;
            --text: #2c3e50;
            --white: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 20px; 
            text-align: center; 
            background-color: var(--bg); 
            color: var(--text); 
        }

        .header-area { display: flex; align-items: center; justify-content: center; gap: 20px; margin-top: 50px; flex-wrap: wrap; }
        .set-logo { height: 80px; width: auto; object-fit: contain; }

        .back { 
            display: inline-block; text-decoration: none; color: var(--primary); font-weight: bold; 
            float: left; padding: 10px 18px; background: var(--white); border-radius: 8px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: 0.2s; 
        }
        .back:hover { background: var(--primary); color: var(--white); }
        
        .progress-container { 
            background: var(--white); padding: 20px; border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin: 20px 0; clear: both;
        }
        .progress-bar-bg { background: #e0e0e0; border-radius: 10px; height: 24px; overflow: hidden; margin-top: 12px; border: 1px solid #ddd; }
        .progress-bar-fill { background: linear-gradient(90deg, var(--primary), var(--secondary)); height: 100%; width: 0%; transition: width 0.5s ease; }

        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .select-all-area { background: var(--white); padding: 10px 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 10px; font-weight: bold; }

        .search-box { flex-grow: 1; padding: 15px; border: 2px solid var(--primary); border-radius: 12px; font-size: 17px; outline: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        table { width: 100%; border-collapse: collapse; background: var(--white); border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); overflow: hidden; }
        th { background-color: var(--primary); color: var(--white); padding: 18px; text-align: left; position: sticky; top: 0; z-index: 10; }
        td { padding: 14px; border-bottom: 1px solid #eee; text-align: left; }

        .card-img { 
            width: 65px; height: 90px; object-fit: contain; cursor: zoom-in; 
            background: #f9f9f9; border-radius: 5px; transition: transform 0.25s ease; 
            position: relative; z-index: 1; transform-origin: left center;
        }
        .card-img:hover { transform: scale(4.8); z-index: 9999; box-shadow: 0 15px 45px rgba(0,0,0,0.6); }

        .owned-row { background-color: #ebfaed !important; }
        .hidden { display: none !important; }
        .name-de { font-size: 1.1em; font-weight: bold; display: block; }
        .name-en { font-size: 0.85em; color: #7f8c8d; font-style: italic; }
        input[type="checkbox"] { transform: scale(1.6); cursor: pointer; accent-color: var(--secondary); }
    </style>
</head>
<body>

    <a href="index.html" class="back">← Zurück</a>

    <div class="header-area">
        <img id="setLogoImg" class="set-logo" src="" alt="Set Logo">
        <h1 id="setTitle">Lade Set...</h1>
    </div>
    
    <div class="progress-container">
        <div id="progressText">Berechne Fortschritt...</div>
        <div class="progress-bar-bg"><div id="progressBar" class="progress-bar-fill"></div></div>
    </div>

    <div class="controls">
        <input type="text" id="searchInput" class="search-box" placeholder="Suche (z.B. Glurak)..." onkeyup="filterTable()">
        <div class="select-all-area">
            <label for="selectAll">Alle wählen:</label>
            <input type="checkbox" id="selectAll" onchange="toggleAll(this)">
        </div>
    </div>

    <table>
        <thead>
            <tr><th>Bild</th><th>Nr.</th><th>Name</th><th>Seltenheit</th><th>Besitz</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const setId = urlParams.get('set') || 'base1';
        let allCards = [];

        const setNames = {
            "base1": "Base Set", 
            "base2": "Base Set 2", 
            "ex3": "EX Rubin & Saphir", 
            "xy12": "Evolutions", 
            "cel25": "Celebrations"
        };

        async function loadSetData() {
            document.getElementById('setTitle').innerText = setNames[setId] || "Pokémon Set";
            
            // Lokales Logo laden
            document.getElementById('setLogoImg').src = `./bilder/${setId}.png`;
            document.getElementById('setLogoImg').onerror = function() { this.style.display = 'none'; };
            
            try {
                // Wir laden die Datei basierend auf der URL (z.B. base2.json)
                const response = await fetch(`./daten/${setId}.json`);
                if (!response.ok) throw new Error("Datei nicht gefunden");
                allCards = await response.json();
                renderTable();
                updateProgress();
            } catch (err) {
                console.error(err);
                document.getElementById('tableBody').innerHTML = `<tr><td colspan="5" style="padding:20px; color:red;">Fehler beim Laden der Datei: daten/${setId}.json</td></tr>`;
            }
        }

        function renderTable() {
            const body = document.getElementById('tableBody');
            body.innerHTML = '';

            // WICHTIG: Die Weiche für Base Set 2 Bilder (API braucht base4 statt base2)
            const apiSetId = setId === 'base2' ? 'base4' : setId;

            allCards.forEach(card => {
                const isOwned = localStorage.getItem(card.id) === 'true';
                const row = document.createElement('tr');
                if(isOwned) row.classList.add('owned-row');
                
                // Bild-URL nutzt die korrigierte apiSetId
                const imgUrl = `https://images.pokemontcg.io/${apiSetId}/${card.n}.png`;
                
                row.setAttribute('data-search', `${card.name} ${card.nameDE || ''} ${card.n}`.toLowerCase());
                row.innerHTML = `
                    <td><img src="${imgUrl}" class="card-img" loading="lazy"></td>
                    <td><b>${card.n}</b></td>
                    <td>
                        <span class="name-de">${card.nameDE || card.name}</span>
                        <span class="name-en">(${card.name})</span>
                    </td>
                    <td><small>${card.r}</small></td>
                    <td><input type="checkbox" class="card-check" data-id="${card.id}" ${isOwned ? 'checked' : ''} onchange="toggleCard('${card.id}', this)"></td>
                `;
                body.appendChild(row);
            });
        }

        function toggleCard(id, checkbox) {
            localStorage.setItem(id, checkbox.checked);
            checkbox.closest('tr').classList.toggle('owned-row', checkbox.checked);
            updateProgress();
        }

        function toggleAll(source) {
            const rows = document.querySelectorAll('#tableBody tr:not(.hidden)');
            rows.forEach(row => {
                const checkbox = row.querySelector('.card-check');
                const id = checkbox.getAttribute('data-id');
                checkbox.checked = source.checked;
                localStorage.setItem(id, source.checked);
                row.classList.toggle('owned-row', source.checked);
            });
            updateProgress();
        }

        function updateProgress() {
            if (allCards.length === 0) return;
            const owned = allCards.filter(card => localStorage.getItem(card.id) === 'true').length;
            const percent = Math.round((owned / allCards.length) * 100);
            document.getElementById('progressBar').style.width = percent + "%";
            document.getElementById('progressText').innerText = `${owned} / ${allCards.length} Karten gesammelt (${percent}%)`;
        }

        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('#tableBody tr').forEach(row => {
                row.classList.toggle('hidden', !row.getAttribute('data-search').includes(query));
            });
            document.getElementById('selectAll').checked = false;
        }

        window.onload = loadSetData;
    </script>
</body>
</html>
